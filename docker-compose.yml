version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cga-postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: cga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cga-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    container_name: cga-backend-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/cga_db
      - REDIS_URL=redis://redis:6379/0
      # The OAuth keys are automatically loaded from docker-compose fetching the local `.env` organically through the volume mount
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
